<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }
        .navbar-brand:hover { color: #ddd; }
        .navbar-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .navbar-links li { margin: 0 1rem; }
        .navbar-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: background 0.3s, transform 0.3s;
        }
        .navbar-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .hamburger { display: none; cursor: pointer; color: #fff; font-size: 1.5rem; }
        @media (max-width: 768px) {
            .navbar-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: #667eea; }
            .navbar-links.active { display: flex; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">MySite</a>
        <ul class="navbar-links" id="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>
    <script>
        function toggleMenu() {
            const links = document.getElementById('nav-links');
            links.classList.toggle('active');
        }



</html></body>    </script>    </script>
</body>
</html>
